<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Netflix India – Watch Shows Online, Watch Movies Online</title>
		<link rel="stylesheet" href="style.css" />

	<body>

				<span class="logo">
					<img src="assets/images/netflix-logo.svg" alt="netflix-logo" />

				<div class="right">
					<button class="language">
						<!-- <span class="material-symbols-outlined">translate</span> -->
						<!-- <span class="translate">
							<img
								src="assets/images/translate_16dp_FFFFFF_FILL0_wght400_GRAD0_opsz20.svg"
								alt="translate" />
						</span> -->
						<svg
							xmlns="http://www.w3.org/2000/svg"
							height="16px"
							viewBox="0 -960 960 960"
							width="16px"
							fill="#FFFFFF">
							<path
								d="m488-96 171-456h82L912-96h-79l-41-117H608L567-96h-79ZM169-216l-50-51 192-190q-36-38-67-79t-54-89h82q18 32 36 54.5t52 60.5q38-42 70-87.5t52-98.5H48v-72h276v-96h72v96h276v72H558q-21 69-61 127.5T409-457l91 90-28 74-112-112-191 189Zm463-63h136l-66-189-70 189Z" />
						</svg>

						English

						<!-- <span class="material-symbols-outlined">arrow_drop_down</span> -->
						<svg
							xmlns="http://www.w3.org/2000/svg"
							height="16px"
							viewBox="0 -960 960 960"
							width="16px"
							fill="#FFFFFF">
							<path d="M480-384 288-576h384L480-384Z" />
						</svg>
					</button>
					<button class="signin">Sign In</button>
				</div>
			</nav>

			<div class="main">
				<div class="big">Unlimited movies, shows, and more</div>
				<div class="medium">Starts at ₹149. Cancel at any time.</div>
				<div class="small">
					Ready to watch? Enter your email to create or restart your membership.
				</div>
				<div class="searchbar">
					<input type="text" placeholder="Email Address" />
					<button class="get-started">
						Get Started

						<svg
							xmlns="http://www.w3.org/2000/svg"
							height="18px"
							viewBox="0 -960 960 960"
							width="18px"
							fill="#FFFFFF">
							<path d="m288-96-68-68 316-316-316-316 68-68 384 384L288-96Z" />
						</svg>
					</button>
				</div>
			</div>

			<!-- BOX TO MAKE THINGS TRANSPERENT -->
			<div class="box"></div>
		</header>

		<main>
			<div class="trending">
				
			</div>
		</main>
